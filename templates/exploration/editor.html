{% extends "base.html" %}
{% load static %}

{% block head %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
    
    <link rel="stylesheet" href="{% static 'css/drawflow_custom.css' %}">
{% endblock %}

{% block content %}

<div class="editor-container">

    <div class="editor-menu">
        <button type="button" class="btn-add cinzel-decorative-bold" onclick="addNode()">
            ✦ NEW SCRIPT
        </button>
    </div>

    <div class="editor-wrapper">
        <div id="drawflow"></div>
    </div>

    <div class="inspector-panel" id="inspector">
        <div class="inspector-header">
            <h4 class="cinzel-decorative-bold">INSPECTOR</h4>
            <div class="header-buttons">
                <button class="btn-delete" onclick="deleteNode()">삭제</button>
                <button class="btn-save" onclick="saveFullMap()">저장</button>
            </div>
        </div>

        <div class="inspector-body">
            <div class="input-group" style="background: #fcfbf6; padding: 12px; border-radius: 6px; border: 1px dashed #ba9e7a;">
                <label>🔒 진입 해금 조건 <span style="font-size:0.75rem; font-weight:normal;">(조건이 없으면 비워두세요)</span></label>
                
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <div class="select-wrapper" style="flex: 1.5;">
                        <select id="node-req-stat" onchange="updateNode()">
                            <option value="">-- 조건 없음 --</option>
                            <option value="stat_str">근력 (STR)</option>
                            <option value="stat_agi">민첩 (AGI)</option>
                            <option value="stat_int">지능 (INT)</option>
                            <option value="stat_luk">행운 (LUK)</option>
                            <option value="stat_rep">평판 (REP)</option>
                            <option value="stat_good">선의 (GOOD)</option>
                            <option value="stat_mag">마력 (MAG)</option>
                            <option value="stat_div">신성력 (DIV)</option>
                        </select>
                    </div>
                    
                    <div class="inspector-group">
                        <label>판정 방식</label>
                        <select id="node-req-operator" onchange="updateNode()">
                            <option value="gte">이상 (>=)</option>
                            <option value="lt">미만 (<)</option>
                        </select>
                    </div>

                    <div class="inspector-group">
                        <label>필요 수치</label>
                        <input type="number" id="node-req-val" value="0" oninput="updateNode()">
                    </div>
                </div>
            </div>

            <div class="input-group" style="background: #ebe8de; padding: 10px; border-radius: 6px; border: 1px dashed #ba9e7a;">
                <label>🔙 귀환할 구역(노드) 번호 ID <span style="font-size:0.75rem; font-weight:normal;">(비워두면 버튼 안 생김)</span></label>
                <input type="number" id="node-return-id" placeholder="예: 1 (1번 노드로 돌아감)" oninput="updateNode()" min="1">
            </div>

            <div class="inspector-group">
                <label>스크립트 제목</label>
                <input type="text" id="node-title" placeholder="제목을 입력하세요" oninput="updateNode()">
            </div>

            <div class="inspector-group">
                <label>발화자 성함</label>
                <input type="text" id="node-speaker" placeholder="직접 입력하세요" oninput="updateNode()">
            </div>

            <div class="inspector-group">
                <label>발화자 모습 파일명 <span style="font-size:0.75rem; color:#888;">(static/img/조사/ 내 파일명)</span></label>
                <input type="text" id="node-speaker-img-name" placeholder="예: npc_seraphion.png" oninput="updateNode()">
            </div>

            <div class="input-group">
                <label>활력 소모량 ⚡</label>
                <input type="number" id="node-stamina" value="1" min="0" oninput="updateNode()">
            </div>

            <div class="input-group">
                <label>획득 아이템 이름 <span style="font-size:0.75rem; font-weight:normal;">(없으면 비워둠)</span></label>
                <input type="text" id="node-item-name" placeholder="예: 정어리 파이" oninput="updateNode()">
                <small style="color: #8c7e6c; display: block; margin-top: 4px; font-size: 0.75rem;">
                </small>
            </div>

            <div class="input-group">
                <label>스크립트 내용 <span style="font-size:0.75rem; font-weight:normal;">(@입력 시 분기점)</span></label>
                <textarea id="node-content" rows="6" placeholder="대사를 입력하세요..." oninput="updateNode()"></textarea>
            </div>

            <div class="input-group">
                <label>배경 이미지 파일명 <span style="font-size:0.75rem; color:#888;">(static/img/조사/ 내 파일명)</span></label>
                <input type="text" id="node-bg-img-name" placeholder="예: valterion_castle.png" oninput="updateNode()">
            </div>

        </div>
    </div>
</div>

<script>
    // 장고 변수를 JS 파일로 넘겨주기 위한 브릿지
    const CSRF_TOKEN = '{{ csrf_token }}';
    const SAVE_URL = "{% url 'exploration:save_map' %}"; 
    const INITIAL_DATA = {{ map_data|safe|default:"null" }};
    const CURRENT_MAP_ID = {{ map_id }}; 
</script>

<script src="{% static 'js/exploration_editor.js' %}"></script>
{% endblock %}
