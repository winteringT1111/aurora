<div id="tab-stats" class="tab-content">
    <div class="stat-container">
        
        <div class="contribution-display">
            <div class="contribution-emblem">
                <span class="contribution-label">용사 기여도</span>
                <div class="contribution-value">30</div>
            </div>
        </div>

        <div class="stat-grid-wrapper">
            <h3 class="stat-title">DETAILED STATS</h3>
            
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">근력</span>
                        <span class="s-val">{{char.stat_str}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 80%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">평판</span>
                        <span class="s-val">{{char.stat_rep}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 90%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">민첩</span>
                        <span class="s-val">{{char.stat_agi}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 90%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">선의</span>
                        <span class="s-val">{{char.stat_good}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 100%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">지능</span>
                        <span class="s-val">{{char.stat_int}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 50%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">마력</span>
                        <span class="s-val">{{char.stat_mag}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 15%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">행운</span>
                        <span class="s-val">{{char.stat_luk}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 10%;"></div></div>
                </div>

                <div class="stat-box">
                    <div class="stat-info">
                        <span class="s-name">신성력</span>
                        <span class="s-val">{{char.stat_div}}</span>
                    </div>
                    <div class="s-bar-bg"><div class="s-bar-fill" style="width: 15%;"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>
